<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodTunes — Feel the Music</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    .hero {
      min-height: 90vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      position: relative; z-index: 1;
    }

    .hero-title {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .hero-sub {
      color: var(--text-secondary);
      font-size: 1.15rem;
      margin-bottom: 3rem;
      max-width: 500px;
    }

    .mood-input-area {
      width: 100%; max-width: 600px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: var(--transition);
    }

    .mood-input-area:focus-within {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    .mood-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      resize: none;
      min-height: 80px;
    }

    .mood-textarea::placeholder { color: var(--text-muted); }

    .emoji-row {
      display: flex; gap: 0.5rem; margin-top: 1rem;
      flex-wrap: wrap;
    }

    .emoji-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 1.3rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .emoji-btn:hover {
      transform: scale(1.2);
      border-color: var(--accent-purple);
    }

    .mood-result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-top: 3rem;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
    }

    .mood-result.visible { display: flex; }

    .section-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .mood-moods-row {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      justify-content: center; margin-top: 2rem;
    }

    .mood-chip {
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .mood-chip:hover { transform: scale(1.05); filter: brightness(1.2); }

    main { position: relative; z-index: 1; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  </style>
</head>
<body>
  <div class="aurora"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">🎵 MoodTunes</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="player.html">Player</a></li>
      <li><a href="discover.html">Discover</a></li>
      <li><a href="playlists.html">Playlists</a></li>
      <li><a href="overlay.html">Overlay</a></li>
    </ul>
  </nav>

  <main>
    <!-- Hero Section -->
    <section class="hero">
      <h1 class="hero-title fade-up">Music that<br>Understands You</h1>
      <p class="hero-sub fade-up-delay">Tell us how you feel — in any language, any emoji — and we'll find the perfect soundtrack for your mood.</p>

      <!-- Mood Input -->
      <div class="mood-input-area fade-up-delay">
        <textarea class="mood-textarea" id="moodText"
          placeholder="Type how you're feeling... e.g. 'Bahut khush hoon aaj! 😊' or 'Feeling sad and lonely 💔' or just drop some emojis 🔥💪"></textarea>

        <div class="emoji-row">
          <span>Quick vibes:</span>
          <button class="emoji-btn" onclick="addEmoji('😊')">😊</button>
          <button class="emoji-btn" onclick="addEmoji('😢')">😢</button>
          <button class="emoji-btn" onclick="addEmoji('💪')">💪</button>
          <button class="emoji-btn" onclick="addEmoji('😌')">😌</button>
          <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
          <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
          <button class="emoji-btn" onclick="addEmoji('🎯')">🎯</button>
          <button class="emoji-btn" onclick="addEmoji('😤')">😤</button>
        </div>

        <div style="display:flex; justify-content:flex-end; margin-top:1rem;">
          <button class="btn btn-primary" onclick="handleDetect()" id="detectBtn">
            ✨ Detect My Mood
          </button>
        </div>
      </div>

      <!-- Mood Result -->
      <div class="mood-result glass" id="moodResult">
        <div class="mood-orb" id="moodOrb">❓</div>
        <div>
          <div id="moodName" style="font-size:2rem; font-weight:800; text-align:center;"></div>
          <div id="moodDesc" style="color:var(--text-secondary); text-align:center; margin-top:0.5rem;"></div>
        </div>
        <div style="display:flex; gap:1rem;">
          <button class="btn btn-primary" onclick="loadMoodSongs()">🎵 Play Songs</button>
          <button class="btn btn-ghost" onclick="goToDiscover()">🔍 Discover More</button>
        </div>
      </div>
    </section>

    <!-- Browse by Mood -->
    <section class="container">
      <div class="section-title">🎭 Browse by Mood</div>
      <div class="mood-moods-row" id="moodChips"></div>
    </section>

    <!-- Trending Songs -->
    <section class="container" style="margin-top:3rem;">
      <div class="section-title">🔥 Trending Now</div>
      <div class="songs-grid" id="trendingGrid">
        <div style="grid-column:1/-1; display:flex; justify-content:center; padding:2rem;">
          <div class="spinner"></div>
        </div>
      </div>
    </section>

    <div style="height: 80px;"></div>
  </main>

  <script src="js/app.js"></script>
  <script>
    let currentMood = null;
    let moodSongs = [];

    // Render mood chips
    const moodChipsEl = document.getElementById('moodChips');
    Object.entries(MOOD_META).forEach(([mood, meta]) => {
      const chip = document.createElement('div');
      chip.className = 'mood-chip';
      chip.style.background = meta.color + '20';
      chip.style.color = meta.color;
      chip.style.borderColor = meta.color + '60';
      chip.textContent = meta.emoji + ' ' + mood;
      chip.addEventListener('click', () => loadSongsByMood(mood));
      moodChipsEl.appendChild(chip);
    });

    // Load trending on startup
    window.addEventListener('DOMContentLoaded', async () => {
      const songs = await getTrendingSongs();
      renderGrid(songs, document.getElementById('trendingGrid'));
    });

    function renderGrid(songs, container) {
      container.innerHTML = '';
      if (!songs.length) {
        container.innerHTML = '<p style="color:var(--text-muted)">No songs found.</p>';
        return;
      }
      songs.forEach((song, i) => {
        const card = renderSongCard(song, (s) => {
          playInPlayer(s, songs);
        });
        card.style.animationDelay = `${i * 0.05}s`;
        container.appendChild(card);
      });
    }

    async function handleDetect() {
      const text = document.getElementById('moodText').value.trim();
      if (!text) { showToast('Please tell us how you feel! 🎵', 'error'); return; }

      const btn = document.getElementById('detectBtn');
      btn.textContent = '🔍 Detecting...';
      btn.disabled = true;

      const result = await detectMood(text);
      currentMood = result.mood;

      // Update orb
      const orb = document.getElementById('moodOrb');
      const meta = MOOD_META[result.mood] || MOOD_META.HAPPY;
      orb.textContent = result.moodEmoji;
      orb.style.background = meta.gradient;
      orb.style.color = result.moodColor;
      orb.style.boxShadow = `0 0 40px ${result.moodColor}60`;

      document.getElementById('moodName').textContent = result.mood;
      document.getElementById('moodName').style.color = result.moodColor;
      document.getElementById('moodDesc').textContent = result.description;

      const moodResult = document.getElementById('moodResult');
      moodResult.classList.add('visible');
      moodResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      btn.textContent = '✨ Detect My Mood';
      btn.disabled = false;
    }

    async function loadMoodSongs() {
      if (!currentMood) return;
      const songs = await getSongsByMood(currentMood);
      moodSongs = songs;
      if (songs.length > 0) playInPlayer(songs[0], songs);
    }

    async function loadSongsByMood(mood) {
      const songs = await getSongsByMood(mood);
      renderGrid(songs, document.getElementById('trendingGrid'));
      document.getElementById('trendingGrid').scrollIntoView({ behavior: 'smooth' });
    }

    function addEmoji(emoji) {
      document.getElementById('moodText').value += emoji;
    }

    function goToDiscover() {
      if (currentMood) localStorage.setItem('moodtunes_discover_mood', currentMood);
      window.location.href = 'discover.html';
    }
  </script>
</body>
</html>
